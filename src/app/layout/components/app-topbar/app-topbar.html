<header
  class="py-4 fixed top-4 left-4 right-4 md:left-8 md:right-8 lg:left-16 lg:right-16 z-20 font-satoshi transition-colors duration-300 rounded-full"
  [ngClass]="{
    'bg-white shadow-sm text-gray-800': isFixed() || fixed(),
    'text-white': !isFixed() && !fixed(),
  }">
  <nav
    class="flex justify-between items-center w-full px-4 sm:px-6 md:px-8 lg:px-12 xl:px-16 2xl:px-24 max-w-screen-2xl mx-auto">
    <div class="flex gap-3 items-center">
      <a routerLink="/" aria-label="logo" class="inline-block">
        <img
          priority
          [ngSrc]="isFixed() || fixed() ? 'images/logo/logo-g.png' : 'images/logo/logo-w.png'"
          width="64"
          height="68"
          alt="logo"
          class="w-8 h-9 cursor-pointer aspect-video object-cover" />
      </a>
    </div>
    <div>
      <app-mobile-nav [links]="links()" />
      <app-desktop-nav [links]="links()" />
    </div>
  </nav>
</header>
