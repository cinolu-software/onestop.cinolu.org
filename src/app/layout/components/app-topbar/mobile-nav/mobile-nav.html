<div class="lg:hidden">
  @let user = authStore.user();

  <button
    (click)="toggleNav()"
    aria-label="Toggle menu"
    class="p-2 rounded-lg hover:bg-gray-100 transition-colors duration-200">
    <i-lucide [name]="isOpen() ? icons.close : icons.menu" class="size-6" />
  </button>

  <div
    class="fixed top-16 left-0 bottom-0 w-full bg-white transition-transform duration-300 border-t border-gray-200"
    [ngClass]="isOpen() ? 'translate-x-0' : 'translate-x-full'">
    <div class="flex flex-col justify-between py-10 px-8 h-full w-full">
      <nav class="flex flex-col items-start gap-4 w-full">
        @for (link of links(); track $index; let i = $index) {
        <div class="w-full">
          @if (link.children?.length) {
          <button
            (click)="toggleLink(i)"
            class="flex justify-between items-center w-full px-4 py-2 text-lg font-medium text-gray-800 border-b border-gray-200 hover:text-primary-600 transition-colors duration-200">
            {{ link.name }}
            <i-lucide
              [name]="icons.chevronRight"
              class="size-5 transition-transform duration-300"
              [ngClass]="{ 'rotate-90': link.open }" />
          </button>

          <div
            class="flex flex-col bg-gray-50 transition-all duration-300 overflow-hidden"
            [style.maxHeight]="link.open ? (link.children?.length ?? 0) * 48 + 'px' : '0px'">
            @for (sublink of link.children; track $index) {
            <a
              [routerLink]="sublink.path"
              routerLinkActive="bg-primary-100 text-primary-600"
              [routerLinkActiveOptions]="{ exact: sublink.exactUrl || false }"
              (click)="closeNav()"
              class="flex gap-2 items-center px-6 py-2 text-lg font-medium text-gray-700 hover:bg-primary-100 hover:text-primary-600 transition-colors duration-200">
              <i-lucide [name]="icons.plus" class="size-3 stroke-[3]" />
              {{ sublink.name }}
            </a>
            }
          </div>
          } @else {
          <a
            [routerLink]="link.path"
            routerLinkActive="text-primary-600"
            [routerLinkActiveOptions]="{ exact: link.exactUrl || false }"
            (click)="closeNav()"
            class="block w-full px-4 py-2 text-lg font-medium text-gray-800 border-b border-gray-200 hover:text-primary-600 transition-colors duration-200">
            {{ link.name }}
          </a>
          }
        </div>
        }
      </nav>

      <div class="border-t border-gray-200 pt-6">
        @if (user) {
        <div class="space-y-3">
          <div class="flex items-center gap-3 px-4 py-2 border border-primary-500 rounded-lg">
            <div class="relative h-10 w-10 flex-shrink-0">
              <img
                [ngSrc]="user | apiIMG: 'user'"
                alt="Photo de {{ user?.name }}"
                class="aspect-square object-cover ring-2 ring-primary-600 bg-gray-200 rounded-full"
                fill />
            </div>
            <span class="text-lg font-medium text-gray-800 truncate">{{ user?.name }}</span>
          </div>

          <div class="flex flex-col gap-2">
            <a
              routerLink="/dashboard"
              (click)="closeNav()"
              class="block w-full px-4 py-2.5 text-center text-lg font-semibold rounded-lg border border-primary-500 text-primary-600 hover:bg-primary-50 transition-colors duration-200">
              Mon compte
            </a>

            <button
              (click)="onSignOut()"
              class="w-full px-4 py-2.5 text-lg font-semibold rounded-lg bg-gray-100 text-gray-700 hover:bg-gray-200 transition-colors duration-200">
              Se déconnecter
            </button>
          </div>
        </div>
        } @else {
        <div class="space-y-3">
          <a
            routerLink="/sign-in"
            (click)="closeNav()"
            class="relative flex w-full items-center justify-center px-6 py-3 rounded-full border border-primary-500 font-semibold text-primary-600 overflow-hidden group transition duration-300">
            <span
              class="absolute inset-0 bg-primary-500 scale-x-0 group-hover:scale-x-100 transition-transform origin-left duration-300"></span>
            <span class="relative group-hover:text-white">Connexion</span>
          </a>

          <a
            routerLink="/sign-up"
            (click)="closeNav()"
            class="relative flex w-full items-center justify-center px-6 py-3 rounded-full bg-primary-500 font-semibold text-white overflow-hidden group transition duration-300">
            <span
              class="absolute inset-0 bg-white scale-x-0 group-hover:scale-x-100 transition-transform origin-left duration-300"></span>
            <span class="relative group-hover:text-primary-600">Inscription</span>
          </a>
        </div>
        }
      </div>
    </div>
  </div>
</div>
