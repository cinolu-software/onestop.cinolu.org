<div
  class="min-h-screen flex items-center justify-center bg-gradient-to-br from-primary-50 via-white to-primary-50 px-4">
  <div class="max-w-2xl w-full text-center">
    <!-- Icon Section -->
    <div class="relative mb-8">
      <div class="absolute inset-0 flex items-center justify-center">
        <div class="w-48 h-48 bg-primary-100 rounded-full opacity-20 animate-pulse"></div>
      </div>
      <div class="relative flex justify-center">
        <div
          class="w-32 h-32 rounded-full bg-gradient-to-br from-primary-500 to-primary-600 flex items-center justify-center shadow-xl">
          <lucide-angular [img]="icons.shieldAlert" class="w-16 h-16 text-white" [strokeWidth]="2" />
        </div>
      </div>
    </div>

    <!-- Message -->
    <h1 class="text-4xl md:text-5xl font-black text-gray-900 mb-4">
      <span class="bg-gradient-to-r from-primary-500 to-primary-700 bg-clip-text text-transparent">
        Accès Non Autorisé
      </span>
    </h1>
    <p class="text-lg text-gray-600 mb-3 max-w-lg mx-auto">
      Vous devez être connecté pour accéder à cette application.
    </p>
    <p class="text-base text-gray-500 mb-10 max-w-md mx-auto">
      Veuillez vous connecter avec vos identifiants pour continuer.
    </p>

    <!-- Actions -->
    <div class="flex flex-col sm:flex-row gap-4 justify-center items-center">
      <button
        pButton
        (click)="redirectToLogin()"
        class="transition-all duration-200 hover:shadow-lg hover:scale-105 active:scale-100">
        <lucide-angular [img]="icons.logIn" class="w-5 h-5" [strokeWidth]="2" />
        <span>Se connecter</span>
      </button>

      <button
        pButton
        outlined
        (click)="redirectToHome()"
        class="transition-all duration-200 hover:shadow-md hover:scale-105 active:scale-100">
        <lucide-angular [img]="icons.home" class="w-5 h-5" [strokeWidth]="2" />
        <span>Retour à l'accueil</span>
      </button>
    </div>
    <!-- Decorative elements -->
    <div class="mt-12 grid grid-cols-5 gap-3 max-w-xs mx-auto opacity-40">
      <div class="h-1.5 bg-primary-200 rounded-full"></div>
      <div class="h-1.5 bg-primary-300 rounded-full"></div>
      <div class="h-1.5 bg-primary-400 rounded-full"></div>
      <div class="h-1.5 bg-primary-300 rounded-full"></div>
      <div class="h-1.5 bg-primary-200 rounded-full"></div>
    </div>
  </div>
</div>
