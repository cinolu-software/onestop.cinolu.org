<form class="w-full" [formGroup]="form" (ngSubmit)="onSubmit()">
  <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-8">
    <div class="mb-8">
      <h6 class="text-lg font-semibold text-gray-800 mb-5 pb-2 border-b border-gray-200">Informations essentielles</h6>
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div class="flex flex-col gap-2">
          <label for="name" class="text-sm font-semibold text-gray-700">
            Nom du projet<span class="text-red-500 ml-1">*</span>
          </label>
          <input
            pInputText
            id="name"
            formControlName="name"
            class="w-full"
            placeholder="Ex: Programme de mentorat entrepreneurial" />
        </div>
        <div class="flex flex-col gap-2">
          <label for="duration_hours" class="text-sm font-semibold text-gray-700">Durée estimée (en heures)</label>
          <input
            pInputText
            id="duration_hours"
            type="number"
            formControlName="duration_hours"
            class="w-full"
            placeholder="Ex: 100" />
        </div>
        <div class="flex flex-col gap-2">
          <label for="program" class="text-sm font-semibold text-gray-700">
            Programme associé<span class="text-red-500 ml-1">*</span>
          </label>
          <p-select
            [filter]="true"
            inputId="program"
            [optionValue]="'id'"
            [optionLabel]="'name'"
            [options]="programsStore.unpaginatedSubprograms()"
            formControlName="program"
            placeholder="Sélectionner un programme"
            class="w-full" />
        </div>
        <div class="flex flex-col gap-2">
          <label for="project_manager" class="text-sm font-semibold text-gray-700">Chef de projet</label>
          <p-select
            inputId="project_manager"
            [optionValue]="'id'"
            [optionLabel]="'name'"
            [options]="usersStore.staff()"
            [filter]="true"
            formControlName="project_manager"
            placeholder="Sélectionner un chef de projet"
            class="w-full" />
        </div>
        <div class="flex flex-col gap-2">
          <label for="categories" class="text-sm font-semibold text-gray-700">
            Catégories<span class="text-red-500 ml-1">*</span>
          </label>
          <p-multiSelect
            [inputId]="'categories'"
            [autocomplete]="'off'"
            [showHeader]="false"
            [optionLabel]="'name'"
            [options]="categoriesStore.allCategories()"
            [optionValue]="'id'"
            formControlName="categories"
            placeholder="Choisir une ou plusieurs catégories"
            class="w-full" />
        </div>
        <div class="flex flex-col gap-2">
          <label for="started_at" class="text-sm font-semibold text-gray-700">
            Date de début<span class="text-red-500 ml-1">*</span>
          </label>
          <p-datePicker formControlName="started_at" class="w-full" />
        </div>
        <div class="flex flex-col gap-2">
          <label for="ended_at" class="text-sm font-semibold text-gray-700">
            Date de fin<span class="text-red-500 ml-1">*</span>
          </label>
          <p-datePicker formControlName="ended_at" class="w-full" />
        </div>
      </div>
    </div>
    <div>
      <h6 class="text-lg font-semibold text-gray-800 mb-5 pb-2 border-b border-gray-200">Présentation détaillée</h6>
      <div class="grid grid-cols-1 gap-6">
        <div class="flex flex-col gap-2">
          <label for="description" class="text-sm font-semibold text-gray-700">
            Présentation générale<span class="text-red-500 ml-1">*</span>
          </label>
          <textarea
            pTextarea
            id="description"
            formControlName="description"
            rows="6"
            class="w-full"
            placeholder="Présentez le projet de manière claire et concise..."></textarea>
        </div>
        <div class="flex flex-col gap-2">
          <label for="context" class="text-sm font-semibold text-gray-700">Contexte et justification</label>
          <textarea
            pTextarea
            id="context"
            formControlName="context"
            rows="6"
            class="w-full"
            placeholder="Expliquez le contexte et la raison d'être du projet..."></textarea>
        </div>
        <div class="flex flex-col gap-2">
          <label for="objectives" class="text-sm font-semibold text-gray-700">Objectifs visés</label>
          <textarea
            pTextarea
            id="objectives"
            formControlName="objectives"
            rows="6"
            class="w-full"
            placeholder="Décrivez les objectifs que le projet vise à atteindre..."></textarea>
        </div>
        <div class="flex flex-col gap-2">
          <label for="selection_criteria" class="text-sm font-semibold text-gray-700">Critères d'éligibilité</label>
          <textarea
            pTextarea
            id="selection_criteria"
            formControlName="selection_criteria"
            rows="6"
            class="w-full"
            placeholder="Spécifiez les critères de sélection ou d'éligibilité..."></textarea>
        </div>
      </div>
    </div>
    <div class="flex justify-end gap-3 mt-8 pt-6 border-t border-gray-200">
      <p-button
        [size]="'small'"
        [loading]="updateProjectStore.isLoading()"
        [disabled]="updateProjectStore.isLoading() || form.invalid"
        type="submit"
        severity="primary">
        Modifier le projet
      </p-button>
    </div>
  </div>
</form>
