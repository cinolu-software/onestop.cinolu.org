<section
  class="py-12 lg:py-20 px-4 sm:px-6 md:px-8 lg:px-16 xl:px-24 2xl:px-32 max-w-screen-2xl mx-auto bg-gradient-to-br from-primary-600 to-primary-700 text-white rounded-3xl">
  <div class="mb-12 lg:mb-16">
    <h2 class="text-3xl sm:text-4xl lg:text-5xl font-black font-satoshi mb-4 tracking-tight leading-tight text-center">
      Rejoignez une communauté <span class="text-primary-100">d'innovation africaine</span>
    </h2>
    <p class="text-base sm:text-lg text-primary-50 leading-relaxed max-w-3xl mx-auto text-center">
      CINOLU OneStop connecte les entrepreneurs, mentors et partenaires qui bâtissent les solutions de demain.
    </p>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-6 lg:gap-8 mb-12">
    @for (benefit of benefits; track $index) {
    <div
      class="flex gap-4 p-6 bg-white/10 backdrop-blur-sm rounded-lg border border-white/20 hover:bg-white/15 transition-all duration-300">
      <div class="flex-shrink-0">
        <div class="w-12 h-12 bg-white/20 rounded-lg flex items-center justify-center">
          <i-lucide [name]="benefit.icon" class="w-6 h-6 text-white" />
        </div>
      </div>
      <div>
        <h3 class="text-xl font-bold mb-2 font-satoshi">{{ benefit.title }}</h3>
        <p class="text-primary-50 leading-relaxed">{{ benefit.description }}</p>
      </div>
    </div>
    }
  </div>

  <div class="flex justify-center">
    <a
      routerLink="/sign-up"
      class="relative inline-flex items-center justify-center px-8 py-4 text-lg font-semibold rounded-full bg-white text-primary-600 overflow-hidden group transition duration-300 shadow-lg hover:shadow-xl">
      <span
        class="absolute inset-0 bg-primary-50 scale-x-0 group-hover:scale-x-100 transition-transform origin-left duration-300"></span>
      <span class="relative">Rejoindre la communauté</span>
    </a>
  </div>
</section>
