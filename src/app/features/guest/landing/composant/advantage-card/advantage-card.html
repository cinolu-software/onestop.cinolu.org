@if (advantage(); as item) {
<div
  class="flex flex-col p-6 lg:p-8 bg-white rounded-lg border border-gray-200 hover:border-primary-300 hover:shadow-lg transition-all duration-300 group h-full">
  <div class="flex items-start justify-between mb-6">
    <div
      [ngClass]="item.bgColor"
      class="w-16 h-16 rounded-xl flex items-center justify-center group-hover:scale-110 transition-transform duration-300">
      <i-lucide [name]="item.icon" [ngClass]="item.iconColor" class="w-8 h-8 stroke-[2]" />
    </div>

    <div [ngClass]="item.bgColor" class="w-10 h-10 rounded-full flex items-center justify-center">
      <span [ngClass]="item.iconColor" class="text-xl font-black font-satoshi"> {{ item.id }} </span>
    </div>
  </div>

  <p [ngClass]="item.textColor" class="text-base lg:text-lg font-medium leading-relaxed">{{ item.description }}</p>
</div>
}
