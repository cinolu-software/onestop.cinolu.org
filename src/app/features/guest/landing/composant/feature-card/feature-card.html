@if (feature(); as item) {
<div
  class="flex flex-col p-6 lg:p-8 bg-white rounded-2xl border border-gray-200 hover:border-primary-300 hover:shadow-lg transition-all duration-300 group">
  <div
    [ngClass]="item.bgColor"
    class="w-16 h-16 rounded-lg flex items-center justify-center mb-6 group-hover:scale-110 transition-transform duration-300">
    <i-lucide [name]="item.icon" [ngClass]="item.iconColor" class="w-8 h-8 stroke-[2]" />
  </div>

  <h3 class="text-xl font-bold text-gray-900 mb-3 font-satoshi">{{ item.title }}</h3>

  <p class="text-base text-gray-600 leading-relaxed">{{ item.description }}</p>
</div>
}
