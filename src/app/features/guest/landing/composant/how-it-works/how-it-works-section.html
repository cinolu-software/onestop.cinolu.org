<section
  class="py-12 lg:py-20 px-4 sm:px-6 md:px-8 lg:px-16 xl:px-24 2xl:px-32 max-w-screen-2xl mx-auto bg-gradient-to-br from-primary-50 via-white to-blue-50/30">
  <div class="mb-12 lg:mb-16">
    <h2 class="text-3xl sm:text-4xl lg:text-5xl font-black font-satoshi mb-4 tracking-tight leading-tight text-center">
      Un accompagnement clair, <span class="text-primary-600">du premier clic à la réussite</span>
    </h2>
    <p class="text-base sm:text-lg text-gray-700 leading-relaxed max-w-3xl mx-auto text-center">
      Découvrez comment OneStop simplifie votre parcours entrepreneurial en 4 étapes simples
    </p>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 lg:gap-8 mb-12">
    @for (step of steps; track step.id) {
    <app-step-card [step]="step" />
    }
  </div>

  <div class="flex justify-center">
    <a
      routerLink="/sign-up"
      class="relative inline-flex items-center justify-center px-8 py-4 text-lg font-semibold rounded-full bg-primary-600 text-white overflow-hidden group transition duration-300 shadow-lg hover:shadow-xl">
      <span
        class="absolute inset-0 bg-primary-700 scale-x-0 group-hover:scale-x-100 transition-transform origin-left duration-300"></span>
      <span class="relative">Commencer maintenant</span>
    </a>
  </div>
</section>
