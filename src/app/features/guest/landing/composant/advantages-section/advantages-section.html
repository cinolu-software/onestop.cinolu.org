<section
  class="py-12 lg:py-20 px-4 sm:px-6 md:px-8 lg:px-16 xl:px-24 2xl:px-32 max-w-screen-2xl mx-auto bg-gradient-to-br from-gray-50 via-white to-primary-50/30">
  <div class="mb-8 lg:mb-12">
    <div class="mb-10">
      <h3
        class="text-3xl text-center sm:text-4xl lg:text-5xl font-black font-satoshi mb-3 tracking-tight leading-tight">
        Nos <span class="text-primary-600">Avantages</span>
      </h3>
    </div>
    <p class="text-base sm:text-lg text-gray-700 leading-relaxed max-w-3xl mx-auto text-center">
      Découvrez les bénéfices de rejoindre notre écosystème entrepreneurial et accélérez votre croissance
    </p>
  </div>
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 lg:gap-8">
    @for (item of advantages; track $index) {
    <app-advantage-card [advantage]="item"></app-advantage-card>
    }
  </div>
</section>
