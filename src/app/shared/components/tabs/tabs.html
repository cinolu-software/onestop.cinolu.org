<div class="flex gap-4 sm:gap-6 lg:gap-8 border-b border-gray-200 overflow-x-auto scrollbar-hide">
  @for (tab of tabs(); track $index) {
  <button
    (click)="onTabChange(tab.name)"
    [ngClass]="{
      'font-semibold text-primary-600 border-primary-600': activeTab() === tab.name,
      'font-medium text-gray-500 hover:text-gray-700 border-transparent hover:border-gray-300': activeTab() !== tab.name
    }"
    class="pb-3 text-xs sm:text-sm border-b-2 transition-all duration-200 flex items-center gap-2 whitespace-nowrap">
    @if (tab.icon) {
    <i-lucide [name]="tab.icon" class="size-4"></i-lucide>
    }
    <span class="hidden sm:inline">{{ tab.label }}</span>
    <span class="sm:hidden">{{ tab.label.split(' ')[0] }}</span>
    @if (activeTab() === tab.name && activeCount() && !isLoading()) {
    <span
      class="px-2 py-0.5 text-xs font-bold rounded-full"
      [ngClass]="{
            'bg-primary-100 text-primary-700': activeTab() === tab.name,
            'bg-gray-100 text-gray-600': activeTab() !== tab.name
          }">
      {{ activeCount() }}
    </span>
    }
  </button>
  }
</div>
